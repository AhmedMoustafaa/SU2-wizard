    default: ( 0.5, 0.02 )
    type: list
  ADJ_LAX_SENSOR_COEFF:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: 1st order artificial dissipation coefficients for the adjoint Lax–Friedrichs
