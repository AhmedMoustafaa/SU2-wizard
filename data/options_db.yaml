    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: 1st order artificial dissipation coefficients for the Lax–Friedrichs
      method ( 0.15 by default )
    default: '0.15'
    type: float
  JST_SENSOR_COEFF:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: 2nd and 4th order artificial dissipation coefficients for the JST
