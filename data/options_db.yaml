      and x/y/z are the new position of each vertex. Points can be in any order. When
      SU2_DOT is called in SURFACE_FILE mode, sensitivities on surfaces will be written
      to an ASCII file with name given by DV_SENS_FILENAME and with format as rows
      of x, y, z, dJ/dx, dJ/dy, dJ/dz for each surface vertex.'
