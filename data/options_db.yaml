      | Mark. List | FFD_BoxTag, i_Ind ) HICKS_HENNE            (  30, Scale | Mark.
      List | Lower(0)/Upper(1) side, x_Loc ) ANGLE_OF_ATTACK        ( 101, Scale |
      Mark. List | 1.0 ) 3D Design variables FFD_CONTROL_POINT      (  11, Scale |
      Mark. List | FFD_BoxTag, i_Ind, j_Ind, k_Ind, x_Mov, y_Mov, z_Mov ) FFD_NACELLE            (  12,
      Scale | Mark. List | FFD_BoxTag, rho_Ind, theta_Ind, phi_Ind, rho_Mov, phi_Mov
      ) FFD_GULL               (  13, Scale | Mark. List | FFD_BoxTag, j_Ind ) FFD_CAMBER             (  14,
      Scale | Mark. List | FFD_BoxTag, i_Ind, j_Ind ) FFD_TWIST              (  15,
      Scale | Mark. List | FFD_BoxTag, j_Ind, x_Orig, y_Orig, z_Orig, x_End, y_End,
      z_End ) FFD_THICKNESS          (  16, Scale | Mark. List | FFD_BoxTag, i_Ind,
      j_Ind ) FFD_ROTATION           (  18, Scale | Mark. List | FFD_BoxTag, x_Axis,
      y_Axis, z_Axis, x_Turn, y_Turn, z_Turn ) FFD_ANGLE_OF_ATTACK    (  24, Scale
