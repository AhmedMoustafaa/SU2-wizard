    type: float
  EDGE_COLORING_GROUP_SIZE:
    section: HYBRID PARALLEL (MPI+OpenMP) OPTIONS
    description: An advanced performance parameter for FVM solvers, a large-ish value
      should be best when relatively few threads per MPI rank are in use (~4). However,
      maximum parallelism is obtained with EDGE_COLORING_GROUP_SIZE=1, consider using
      this value only if SU2 warns about low coloring efficiency during preprocessing
      (performance is usually worse). Setting the option to 0 disables coloring and
      a different strategy is used instead, that strategy is automatically used when
      the coloring efficiency is less than 0.875. The optimum value/strategy is case-dependent.
    default: '512'
    type: int
  EDGE_COLORING_RELAX_DISC_ADJ:
    section: HYBRID PARALLEL (MPI+OpenMP) OPTIONS
    description: Coloring tends to perform better for the discrete adjoint than reductions
      because it uses less memory and enables the shared reading optimization for
      color loops. This option allows an automatic fallback to smaller edge color
      group sizes on ranks where the requested edge color group size is not efficient.
      Specifically, the largest edge color group size up to EDGE_COLORING_GROUP_SIZE
      is chosen that is at least 0.875 efficient. Also, this option allows using more
      colors, up to 255 instead of up to 64.
    default: 'YES'
    type: bool
  LINEAR_SOLVER_PREC_THREADS:
    section: HYBRID PARALLEL (MPI+OpenMP) OPTIONS
    description: Independent "threads per MPI rank" setting for LU-SGS and ILU preconditioners.
      For problems where time is spend mostly in the solution of linear systems (e.g.
      elasticity, very high CFL central schemes), AND, if the memory bandwidth of
      the machine is saturated (4 or more cores per memory channel) better performance
      (via a reduction in linear iterations) may be possible by using a smaller value
      than that defined by the system or in the call to SU2_CFD (via the -t/--threads
      option). The default (0) means "same number of threads as for all else".
    default: '0'
    type: int
  PARMETIS_TOLERANCE:
    section: HYBRID PARALLEL (MPI+OpenMP) OPTIONS
    description: '----------------------- PARTITIONING OPTIONS (ParMETIS) ------------------------
      % Load balancing tolerance, lower values will make ParMETIS work harder to evenly
      distribute the work-estimate metric across all MPI ranks, at the expense of
      more edge cuts (i.e. increased communication cost).'
    default: '0.02'
    type: float
  PARMETIS_EDGE_WEIGHT:
    section: HYBRID PARALLEL (MPI+OpenMP) OPTIONS
    description: The work-estimate metric is a weighted function of the work-per-edge
      (e.g. spatial discretization, linear system solution) and of the work-per-point
      (e.g. source terms, temporal discretization) the former usually accounts for
      >90% of the total. These weights are INTEGERS (for compatibility with ParMETIS)
      thus not [0, 1]. To balance memory usage (instead of computation) the point
      weight needs to be increased (especially for explicit time integration methods).
    default: '1'
    type: int
  PARMETIS_POINT_WEIGHT:
    section: HYBRID PARALLEL (MPI+OpenMP) OPTIONS
    description: ''
    default: '0'
    type: int
