      1.0. Use INC_OUTLET_DAMPING as a relaxation factor. Default value 0.1 is a good
      start.
    default: '0.0'
    type: float
  STREAMWISE_PERIODIC_TEMPERATURE:
    section: STREAMWISE PERIODICITY DEFINITION
    description: Use streamwise periodic temperature (default=NO, YES) If NO, the
      heatflux is taken out at the outlet. This option is only necessary if INC_ENERGY_EQUATION=YES
    default: 'NO'
    type: enum
    choices:
    - 'YES'
  STREAMWISE_PERIODIC_OUTLET_HEAT:
    section: STREAMWISE PERIODICITY DEFINITION
    description: Prescribe integrated heat [W] extracted at the periodic "outlet".
      Only active if STREAMWISE_PERIODIC_TEMPERATURE= NO. If set to zero, the heat
      is integrated automatically over all present MARKER_HEATFLUX. Upon convergence,
      the area averaged inlet temperature will be INC_TEMPERATURE_INIT. Defaults to
      0.0.
    default: '0.0'
    type: float
  MARKER_EULER:
    section: BOUNDARY CONDITION DEFINITION
    description: Euler wall boundary marker(s) (NONE = no marker) Implementation identical
      to MARKER_SYM.
    default: ( airfoil )
    type: list
  MARKER_HEATFLUX:
    section: BOUNDARY CONDITION DEFINITION
    description: 'Navier-Stokes (no-slip), constant heat flux wall  marker(s) (NONE
      = no marker) Format: ( marker name, constant heat flux (J/m^2), ... )'
    default: ( NONE )
    type: list
  MARKER_HEATTRANSFER:
    section: BOUNDARY CONDITION DEFINITION
    description: 'Navier-Stokes (no-slip), heat-transfer/convection wall marker(s)
      (NONE = no marker) Available for compressible and incompressible flow. Format:
      ( marker name, constant heat-transfer coefficient (J/(K*m^2)), constant reservoir
      Temperature (K) ... )'
    default: ( NONE )
    type: list
  MARKER_ISOTHERMAL:
    section: BOUNDARY CONDITION DEFINITION
    description: 'Navier-Stokes (no-slip), isothermal wall marker(s) (NONE = no marker)
      Format: ( marker name, constant wall temperature (K), ... )'
    default: ( NONE )
    type: list
  MARKER_WALL_SPECIES:
    section: BOUNDARY CONDITION DEFINITION
    description: 'Wall species boundary condition marker(s) for species transport
      (NONE = no marker) Specify either a Neumann flux boundary condition (FLUX) or
      a Dirichlet value boundary condition (VALUE) for each species independently.
      All markers must specify the same number of species. Format: ( marker_name,
      BC_TYPE_1, value_1, BC_TYPE_2, value_2, ..., BC_TYPE_N, value_N, ... ) where
      BC_TYPE is either FLUX (Neumann) or VALUE (Dirichlet) for each species Example
      for 3 species: MARKER_WALL_SPECIES= (wall1, FLUX, 0.0, VALUE, 0.3, VALUE, 0.2,
      wall2, VALUE, 0.1, VALUE, 0.4, FLUX, 0.0) If MARKER_WALL_SPECIES is not specified,
      a zero-flux boundary condition will be used.'
    default: ( NONE )
    type: enum
    choices:
    - FLUX
    - VALUE
    - BC_TYPE_1
    - BC_TYPE_2
    - BC_TYPE_N
