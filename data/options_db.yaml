    section: SURFACES IDENTIFICATION
    description: Marker(s) of the surface where custom thermal BC's are defined.
    default: ( NONE )
    type: list
  MARKER_DESIGNING:
    section: SURFACES IDENTIFICATION
    description: Marker(s) of the surface where obj. func. (design problem) will be
      evaluated
    default: ( airfoil )
    type: list
  MARKER_ANALYZE:
    section: SURFACES IDENTIFICATION
    description: Marker(s) of the surface that is going to be analyzed in detail (massflow,
      average pressure, distortion, etc)
    default: ( airfoil )
    type: list
  MARKER_ANALYZE_AVERAGE:
    section: SURFACES IDENTIFICATION
    description: Method to compute the average value in MARKER_ANALYZE (AREA, MASSFLUX).
    default: MASSFLUX
    type: enum
    choices:
    - AREA
    - MASSFLUX
  NUM_METHOD_GRAD:
    section: COMMON PARAMETERS DEFINING THE NUMERICAL METHOD
    description: Numerical method for spatial gradients (GREEN_GAUSS, WEIGHTED_LEAST_SQUARES)
    default: GREEN_GAUSS
    type: enum
    choices:
    - NONE
    - GREEN_GAUSS
    - LEAST_SQUARES
    - WEIGHTED_LEAST_SQUARES
  NUM_METHOD_GRAD_RECON:
    section: COMMON PARAMETERS DEFINING THE NUMERICAL METHOD
    description: Numerical method for spatial gradients to be used for MUSCL reconstruction
      Options are (GREEN_GAUSS, WEIGHTED_LEAST_SQUARES, LEAST_SQUARES). Default value
      is NONE and the method specified in NUM_METHOD_GRAD is used.
    default: LEAST_SQUARES
    type: enum
    choices:
    - NONE
    - GREEN_GAUSS
    - LEAST_SQUARES
    - WEIGHTED_LEAST_SQUARES
  CFL_NUMBER:
    section: COMMON PARAMETERS DEFINING THE NUMERICAL METHOD
    description: CFL number (initial value for the adaptive CFL number)
    default: '15.0'
    type: float
  CFL_ADAPT:
    section: COMMON PARAMETERS DEFINING THE NUMERICAL METHOD
    description: Adaptive CFL number (NO, YES)
    default: 'NO'
    type: enum
    choices:
    - 'NO'
    - 'YES'
  CFL_ADAPT_PARAM:
    section: COMMON PARAMETERS DEFINING THE NUMERICAL METHOD
    description: Parameters of the adaptive CFL number (factor-down, factor-up, CFL
      min value, CFL max value, acceptable linear solver convergence, starting iteration)
      After the starting iteration has passed, local CFL increases by factor-up until
      max if the solution rate of change is not limited, and acceptable linear convergence
      is achieved. It is reduced if rate is limited, or if there is not enough linear
      convergence, or if the nonlinear residuals are stagnant and oscillatory. It
      is reset back to min when linear solvers diverge, or if nonlinear residuals
      increase too much.
    default: ( 0.1, 2.0, 10.0, 1e10, 0.001, 0)
    type: list
  MAX_DELTA_TIME:
    section: COMMON PARAMETERS DEFINING THE NUMERICAL METHOD
    description: Maximum Delta Time in local time stepping simulations
    default: 1E6
    type: float
  EXT_ITER_OFFSET:
    section: COMMON PARAMETERS DEFINING THE NUMERICAL METHOD
    description: External iteration offset due to restart
    default: '0'
    type: int
  RK_ALPHA_COEFF:
    section: COMMON PARAMETERS DEFINING THE NUMERICAL METHOD
    description: Runge-Kutta alpha coefficients
    default: ( 0.66667, 0.66667, 1.000000 )
    type: list
  OBJECTIVE_FUNCTION:
    section: COMMON PARAMETERS DEFINING THE NUMERICAL METHOD
    description: 'Objective function in gradient evaluation  (DRAG, LIFT, SIDEFORCE,
      MOMENT_X, MOMENT_Y, MOMENT_Z, EFFICIENCY, BUFFET, EQUIVALENT_AREA, NEARFIELD_PRESSURE,
      FORCE_X, FORCE_Y, FORCE_Z, THRUST, TORQUE, TOTAL_HEATFLUX, CUSTOM_OBJFUNC MAXIMUM_HEATFLUX,
      INVERSE_DESIGN_PRESSURE, INVERSE_DESIGN_HEATFLUX, SURFACE_TOTAL_PRESSURE, SURFACE_MASSFLOW,
      SURFACE_STATIC_PRESSURE, SURFACE_MACH) For a weighted sum of objectives: separate
      by commas, add OBJECTIVE_WEIGHT and MARKER_MONITORING in matching order.'
    default: DRAG
    type: enum
    choices:
    - DRAG
    - LIFT
    - SIDEFORCE
    - MOMENT_X
    - MOMENT_Y
    - MOMENT_Z
    - EFFICIENCY
    - BUFFET
    - EQUIVALENT_AREA
    - NEARFIELD_PRESSURE
    - FORCE_X
    - FORCE_Y
    - FORCE_Z
    - THRUST
    - TORQUE
    - TOTAL_HEATFLUX
    - INVERSE_DESIGN_PRESSURE
    - INVERSE_DESIGN_HEATFLUX
    - SURFACE_TOTAL_PRESSURE
    - SURFACE_MASSFLOW
    - SURFACE_STATIC_PRESSURE
    - SURFACE_MACH
  OBJECTIVE_WEIGHT:
    section: COMMON PARAMETERS DEFINING THE NUMERICAL METHOD
    description: List of weighting values when using more than one OBJECTIVE_FUNCTION.
      Separate by commas and match with MARKER_MONITORING.
    default: '1.0'
    type: float
  CUSTOM_OBJFUNC:
    section: COMMON PARAMETERS DEFINING THE NUMERICAL METHOD
    description: Expression used when "OBJECTIVE_FUNCTION= CUSTOM_OBJFUNC", any history/screen
      output can be used together with common math functions (sqrt, cos, exp, etc.).
      This can be used for constraint aggregation (as below) or to compute something
      SU2 does not, see TestCases/user_defined_functions/.
    default: '''DRAG + 10 * pow(fmax(0.4-LIFT, 0), 2)'''
    type: string
  MUSCL_FLOW:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Monotonic Upwind Scheme for Conservation Laws (TVD) in the flow equations.
      Required for 2nd order upwind schemes (NO, YES)
    default: 'YES'
    type: enum
    choices:
    - TVD
    - 'NO'
    - 'YES'
  RAMP_MUSCL:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Option to ramp the MUSCL reconstruction scheme gradually from first
      to second order
    default: 'NO'
    type: bool
  RAMP_MUSCL_COEFF:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Coefficients for the MUSCL ramp, 1st is ramp start iteration, 2nd
      is the ramp update frequency, 3rd is the total number of iterations of the ramp
    default: (1000.0, 10.0, 500.0)
    type: list
  RAMP_MUSCL_POWER:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Value for modifying how aggresively the ramp is applied (cannot be
      less than or equal to 0) < 1 = Aggresive ramp up early, slower later, > 1 slow
      initial ramping, more aggresive towards end
    default: '1'
    type: int
  KIND_MUSCL_RAMP:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Type of MUSCL ramp function used ITERATION = [min(1.0, iter/endIter)]^RAMP_MUSCL_POWER
      SMOOTH_FUNCTION = [1/2 * ( 1 - cos ( pi * min(1.0, iter/endIter)))]^RAMP_MUSCL_POWER
    default: ITERATION
    type: enum
    choices:
    - ITERATION
    - SMOOTH_FUNCTION
  MUSCL_KAPPA_FLOW:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Coefficient for blending upwind and central differences in MUSCL
      scheme. Values range from -1 (fully one-sided) to 1 (central difference).
    default: '0.0'
    type: float
  SLOPE_LIMITER_FLOW:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Slope limiter (NONE, VENKATAKRISHNAN, VENKATAKRISHNAN_WANG, BARTH_JESPERSEN,
      VAN_ALBADA_EDGE, NISHIKAWA_R3, NISHIKAWA_R4, NISHIKAWA_R5)
    default: VENKATAKRISHNAN
    type: enum
    choices:
    - NONE
    - VENKATAKRISHNAN
    - NISHIKAWA_R3
    - NISHIKAWA_R4
    - NISHIKAWA_R5
    - VENKATAKRISHNAN_WANG
    - BARTH_JESPERSEN
    - VAN_ALBADA_EDGE
    - SHARP_EDGES
    - WALL_DISTANCE
  MUSCL_TURB:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Same as MUSCL_FLOW but for turbulence.
    default: 'NO'
    type: bool
  MUSCL_KAPPA_TURB:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Same as MUSCL_KAPPA_FLOW but for turbulence.
    default: '0.0'
    type: float
  SLOPE_LIMITER_TURB:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Slope limiter (same as SLOPE_LIMITER_FLOW except VAN_ALBADA_EDGE)
    default: VENKATAKRISHNAN
    type: enum
    choices:
    - NONE
    - VENKATAKRISHNAN
    - NISHIKAWA_R3
    - NISHIKAWA_R4
    - NISHIKAWA_R5
    - VENKATAKRISHNAN_WANG
    - BARTH_JESPERSEN
    - VAN_ALBADA_EDGE
    - SHARP_EDGES
    - WALL_DISTANCE
  MUSCL_ADJFLOW:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Same as MUSCL_FLOW but for the continuous adjoint equations.
    default: 'YES'
    type: bool
  MUSCL_KAPPA_ADJFLOW:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Same as MUSCL_KAPPA_FLOW but for the continuous adjoint equations.
    default: '0.0'
    type: float
  SLOPE_LIMITER_ADJFLOW:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Slope limiter (same as SLOPE_LIMITER_FLOW plus SHARP_EDGES, WALL_DISTANCE)
    default: VENKATAKRISHNAN
    type: enum
    choices:
    - NONE
    - VENKATAKRISHNAN
    - NISHIKAWA_R3
    - NISHIKAWA_R4
    - NISHIKAWA_R5
    - VENKATAKRISHNAN_WANG
    - BARTH_JESPERSEN
    - VAN_ALBADA_EDGE
    - SHARP_EDGES
    - WALL_DISTANCE
  MUSCL_ADJTURB:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Same as MUSCL_FLOW but for continuous adjoint turbulence equations.
