version: 8.4.0
wizard_stages:
- - Problem Definition
  - - SOLVER
    - MATH_PROBLEM
    - SYSTEM_MEASUREMENTS
    - AXISYMMETRIC
    - RESTART_SOL
- - Turbulence & Physics Models
  - - KIND_TURB_MODEL
    - SST_OPTIONS
    - SA_OPTIONS
    - KIND_TRANS_MODEL
    - LM_OPTIONS
    - KIND_SGS_MODEL
    - HYBRID_RANSLES
- - Compressible Flow Conditions
  - - MACH_NUMBER
    - AOA
    - SIDESLIP_ANGLE
    - INIT_OPTION
    - FREESTREAM_OPTION
    - FREESTREAM_PRESSURE
    - FREESTREAM_TEMPERATURE
    - REYNOLDS_NUMBER
    - REYNOLDS_LENGTH
    - FREESTREAM_TURBULENCEINTENSITY
    - FREESTREAM_TURB2LAMVISCRATIO
    - REF_DIMENSIONALIZATION
- - Incompressible Flow Conditions
  - - INC_DENSITY_MODEL
    - INC_ENERGY_EQUATION
    - INC_DENSITY_INIT
    - INC_VELOCITY_INIT
    - INC_TEMPERATURE_INIT
    - INC_NONDIM
- - Fluid Model
  - - FLUID_MODEL
    - GAMMA_VALUE
    - GAS_CONSTANT
    - VISCOSITY_MODEL
    - MU_CONSTANT
    - MU_REF
    - MU_T_REF
    - SUTHERLAND_CONSTANT
    - CONDUCTIVITY_MODEL
    - PRANDTL_LAM
    - PRANDTL_TURB
    - SPECIFIC_HEAT_CP
- - Reference Values
  - - REF_ORIGIN_MOMENT_X
    - REF_ORIGIN_MOMENT_Y
    - REF_ORIGIN_MOMENT_Z
    - REF_LENGTH
    - REF_AREA
- - Mesh & I/O
  - - MESH_FILENAME
    - MESH_FORMAT
- - Boundary Conditions
  - - MARKER_EULER
    - MARKER_FAR
    - MARKER_SYM
    - MARKER_ISOTHERMAL
    - MARKER_HEATFLUX
    - MARKER_INLET
    - MARKER_OUTLET
    - INLET_TYPE
    - INC_INLET_TYPE
    - INC_OUTLET_TYPE
    - MARKER_MONITORING
    - MARKER_PLOTTING
- - Numerical Methods
  - - NUM_METHOD_GRAD
    - NUM_METHOD_GRAD_RECON
    - CFL_NUMBER
    - CFL_ADAPT
    - CONV_NUM_METHOD_FLOW
    - MUSCL_FLOW
    - SLOPE_LIMITER_FLOW
    - CONV_NUM_METHOD_TURB
    - MUSCL_TURB
    - SLOPE_LIMITER_TURB
    - TIME_DISCRE_FLOW
    - LINEAR_SOLVER
    - LINEAR_SOLVER_PREC
    - LINEAR_SOLVER_ERROR
    - LINEAR_SOLVER_ITER
    - MGLEVEL
- - Convergence Control
  - - ITER
    - CONV_FIELD
    - CONV_RESIDUAL_MINVAL
    - CONV_STARTITER
    - CONV_CAUCHY_ELEMS
    - CONV_CAUCHY_EPS
    - OBJECTIVE_FUNCTION
- - Time-Dependent Settings
  - - TIME_DOMAIN
    - TIME_MARCHING
    - TIME_STEP
    - MAX_TIME
    - TIME_ITER
    - UNST_CFL_NUMBER
- - Output
  - - OUTPUT_FILES
    - CONV_FILENAME
    - RESTART_FILENAME
    - VOLUME_FILENAME
    - SURFACE_FILENAME
    - SCREEN_OUTPUT
    - HISTORY_OUTPUT
    - OUTPUT_WRT_FREQ
options:
  SOLVER:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Solver type (EULER, NAVIER_STOKES, RANS, INC_EULER, INC_NAVIER_STOKES,
      INC_RANS, NEMO_EULER, NEMO_NAVIER_STOKES, FEM_EULER, FEM_NAVIER_STOKES, FEM_RANS,
      FEM_LES, HEAT_EQUATION_FVM, ELASTICITY)
    default: EULER
    type: enum
    choices:
    - NONE
    - EULER
    - NAVIER_STOKES
    - RANS
    - INC_EULER
    - INC_NAVIER_STOKES
    - INC_RANS
    - FEM_EULER
    - FEM_NAVIER_STOKES
    - FEM_RANS
    - FEM_LES
    - NEMO_EULER
    - NEMO_NAVIER_STOKES
    - HEAT_EQUATION
    - ELASTICITY
    - TEMPLATE_SOLVER
    - MULTIPHYSICS
  KIND_TURB_MODEL:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Specify turbulence model (NONE, SA, SST)
    default: NONE
    type: enum
    choices:
    - NONE
    - SA
    - SST
    requires_solver: &id001
    - RANS
    - INC_RANS
    - FEM_RANS
    - DISC_ADJ_RANS
    - DISC_ADJ_INC_RANS
  SST_OPTIONS:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Specify versions/corrections of the SST model (V2003m, V1994m, VORTICITY,
      KATO_LAUNDER, UQ, SUSTAINING, COMPRESSIBILITY-WILCOX, COMPRESSIBILITY-SARKAR,
      DIMENSIONLESS_LIMIT)
    default: NONE
    type: enum
    choices:
    - VORTICITY
    - KATO_LAUNDER
    - UQ
    - SUSTAINING
    - COMPRESSIBILITY-WILCOX
    - COMPRESSIBILITY-SARKAR
    - DIMENSIONLESS_LIMIT
    requires_solver: *id001
  SA_OPTIONS:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Specify versions/corrections of the SA model (NEGATIVE, EDWARDS,
      WITHFT2, QCR2000, COMPRESSIBILITY, ROTATION, BCM, EXPERIMENTAL)
    default: NONE
    type: enum
    choices:
    - NEGATIVE
    - EDWARDS
    - WITHFT2
    - QCR2000
    - COMPRESSIBILITY
    - ROTATION
    - BCM
    - EXPERIMENTAL
    requires_solver: *id001
  KIND_TRANS_MODEL:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Transition model (NONE, LM)
    default: NONE
    type: enum
    choices:
    - NONE
    - LM
    requires_solver: *id001
  HROUGHNESS:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Value of RMS roughness for transition model
    default: '1.0e-6'
    type: float
    requires_solver: *id001
  LM_OPTIONS:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Specify versions/correlations of the LM model (LM2015, MALAN, SULUKSNA,
      KRAUSE, KRAUSE_HYPER, MEDIDA, MEDIDA_BAEDER, MENTER_LANGTRY)
    default: NONE
    type: enum
    choices:
    - LM2015
    - MALAN
    - SULUKSNA
    - KRAUSE
    - KRAUSE_HYPER
    - MEDIDA
    - MEDIDA_BAEDER
    - MENTER_LANGTRY
    requires_solver: *id001
  KIND_SGS_MODEL:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Specify subgrid scale model(NONE, IMPLICIT_LES, SMAGORINSKY, WALE,
      VREMAN)
    default: NONE
    type: enum
    choices:
    - NONE
    - IMPLICIT_LES
    - SMAGORINSKY
    - WALE
    - VREMAN
    requires_solver: &id006
    - FEM_EULER
    - FEM_NAVIER_STOKES
    - FEM_RANS
    - FEM_LES
  KIND_VERIFICATION_SOLUTION:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Specify the verification solution(NO_VERIFICATION_SOLUTION, INVISCID_VORTEX,
      RINGLEB, NS_UNIT_QUAD, TAYLOR_GREEN_VORTEX, MMS_NS_UNIT_QUAD, MMS_NS_UNIT_QUAD_WALL_BC,
      MMS_NS_TWO_HALF_CIRCLES, MMS_NS_TWO_HALF_SPHERES, MMS_INC_EULER, MMS_INC_NS,
      INC_TAYLOR_GREEN_VORTEX, USER_DEFINED_SOLUTION)
    default: NO_VERIFICATION_SOLUTION
    type: enum
    choices:
    - NO_VERIFICATION_SOLUTION
    - INVISCID_VORTEX
    - RINGLEB
    - NS_UNIT_QUAD
    - TAYLOR_GREEN_VORTEX
    - MMS_NS_UNIT_QUAD
    - MMS_NS_UNIT_QUAD_WALL_BC
    - MMS_NS_TWO_HALF_CIRCLES
    - MMS_NS_TWO_HALF_SPHERES
    - MMS_INC_EULER
    - MMS_INC_NS
    - INC_TAYLOR_GREEN_VORTEX
    - USER_DEFINED_SOLUTION
  MATH_PROBLEM:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Mathematical problem (DIRECT, CONTINUOUS_ADJOINT, DISCRETE_ADJOINT)
      Defaults to DISCRETE_ADJOINT for the SU2_*_AD codes, and to DIRECT otherwise.
    default: DIRECT
    type: enum
    choices:
    - DIRECT
    - CONTINUOUS_ADJOINT
    - DISCRETE_ADJOINT
  AXISYMMETRIC:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Axisymmetric simulation for 2D problems. (NO, YES)
    default: 'NO'
    type: enum
    choices:
    - 'NO'
    - 'YES'
  GRAVITY_FORCE:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Gravity force
    default: 'NO'
    type: bool
  RESTART_SOL:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Restart solution (NO, YES)
    default: 'NO'
    type: enum
    choices:
    - 'NO'
    - 'YES'
  WRT_RESTART_COMPACT:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Only save the minimum required variables for restarting to restart
      files (NO, YES). If this option is set to NO, then all fields will be written
      to all output files. To minimize the size of other output files (e.g. paraview,
      tecplot) by not including default restart fields in them, add the keyword COMPACT
      to VOLUME_OUTPUT.
    default: 'YES'
    type: enum
    choices:
    - 'NO'
    - 'YES'
  DISCARD_INFILES:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: Discard the data storaged in the solution and geometry files e.g.
      AOA, dCL/dAoA, dCD/dCL, iter, etc. Note that AoA in the solution and geometry
      files is critical to aero design using AoA as a variable. (NO, YES)
    default: 'NO'
    type: enum
    choices:
    - 'NO'
    - 'YES'
  SYSTEM_MEASUREMENTS:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: 'System of measurements (SI, US) International system of units (SI):
      ( meters, kilograms, Kelvins, Newtons = kg m/s^2, Pascals = N/m^2, Density =
      kg/m^3, Speed = m/s, Equiv. Area = m^2 ) United States customary units (US):
      ( inches, slug, Rankines, lbf = slug ft/s^2, psf = lbf/ft^2, Density = slug/ft^3,
      Speed = ft/s, Equiv. Area = ft^2 )'
    default: SI
    type: enum
    choices:
    - SI
    - US
  CONFIG_LIST:
    section: DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION
    description: List of config files for each zone in a multizone setup with SOLVER=MULTIPHYSICS
      Order here has to match the order in the meshfile if just one is used.
    default: (configA.cfg, configB.cfg, ...)
    type: list
  ITER:
    section: SOLVER CONTROL
    description: Number of iterations for single-zone problems
    default: '1'
    type: int
  INNER_ITER:
    section: SOLVER CONTROL
    description: Maximum number of inner iterations
    default: '9999'
    type: int
  OUTER_ITER:
    section: SOLVER CONTROL
    description: Maximum number of outer iterations (only for multizone problems)
    default: '1'
    type: int
  TIME_ITER:
    section: SOLVER CONTROL
    description: Maximum number of time iterations
    default: '1'
    type: int
  CONV_FIELD:
    section: SOLVER CONTROL
    description: Convergence field
    default: DRAG
    type: string
  CONV_RESIDUAL_MINVAL:
    section: SOLVER CONTROL
    description: Min value of the residual (log10 of the residual)
    default: '-8'
    type: int
  CONV_STARTITER:
    section: SOLVER CONTROL
    description: Start convergence criteria at iteration number
    default: '10'
    type: int
  CONV_CAUCHY_ELEMS:
    section: SOLVER CONTROL
    description: Number of elements to apply the criteria
    default: '100'
    type: int
  CONV_CAUCHY_EPS:
    section: SOLVER CONTROL
    description: Epsilon to control the series convergence
    default: 1E-10
    type: float
  RESTART_ITER:
    section: SOLVER CONTROL
    description: Iteration number to begin unsteady restarts
    default: '0'
    type: int
  WINDOW_CAUCHY_CRIT:
    section: SOLVER CONTROL
    description: Time convergence monitoring
    default: 'YES'
    type: bool
  CONV_WINDOW_FIELD:
    section: SOLVER CONTROL
    description: List of time convergence fields
    default: (TAVG_DRAG, TAVG_LIFT)
    type: list
  CONV_WINDOW_STARTITER:
    section: SOLVER CONTROL
    description: Time Convergence Monitoring starts at Iteration WINDOW_START_ITER
      + CONV_WINDOW_STARTITER
    default: '0'
    type: int
  CONV_WINDOW_CAUCHY_EPS:
    section: SOLVER CONTROL
    description: Epsilon to control the series convergence
    default: 1E-3
    type: float
  CONV_WINDOW_CAUCHY_ELEMS:
    section: SOLVER CONTROL
    description: Number of elements to apply the criteria
    default: '10'
    type: int
  MAX_UPDATE_FLOW:
    section: SOLVER CONTROL
    description: Maximum ratio for updating density and energy variables evaluated
      by the linear solver relative to the non-linear solution at previous iteration.
      Low values ensure stability but may result in longer convergence times, based
      on numerical experiments Default= 0.2
    default: '0.2'
    type: float
  MAX_UPDATE_SA:
    section: SOLVER CONTROL
    description: Same as MAX_UPDATE_FLOW but for updating nu_tilde variable in SA
      model, not applicable for Neg model (Default= 0.99)
    default: '0.99'
    type: float
  MAX_UPDATE_SST:
    section: SOLVER CONTROL
    description: Same as MAX_UPDATE_FLOW but for updating TKE and Omega variables
      in SST model (Default= 1.0)
    default: '1.0'
    type: float
  TIME_DOMAIN:
    section: TIME-DEPENDENT SIMULATION
    description: Time domain simulation
    default: 'NO'
    type: bool
  TIME_MARCHING:
    section: TIME-DEPENDENT SIMULATION
    description: Unsteady simulation (NO, TIME_STEPPING, DUAL_TIME_STEPPING-1ST_ORDER,
      DUAL_TIME_STEPPING-2ND_ORDER, HARMONIC_BALANCE)
    default: 'NO'
    type: enum
    choices:
    - 'NO'
    - TIME_STEPPING
    - DUAL_TIME_STEPPING-1ST_ORDER
    - DUAL_TIME_STEPPING-2ND_ORDER
    - HARMONIC_BALANCE
    - ROTATIONAL_FRAME
  TIME_STEP:
    section: TIME-DEPENDENT SIMULATION
    description: Time Step for dual time stepping simulations (s) -- Only used when
      UNST_CFL_NUMBER = 0.0 For the DG-FEM solver it is used as a synchronization
      time when UNST_CFL_NUMBER != 0.0
    default: '0.0'
    type: float
  MAX_TIME:
    section: TIME-DEPENDENT SIMULATION
    description: Total Physical Time for dual time stepping simulations (s)
    default: '50.0'
    type: float
  UNST_CFL_NUMBER:
    section: TIME-DEPENDENT SIMULATION
    description: Unsteady Courant-Friedrichs-Lewy number of the finest grid
    default: '0.0'
    type: float
  WINDOW_START_ITER:
    section: TIME-DEPENDENT SIMULATION
    description: Windowed output time averaging Time iteration to start the windowed
      time average in a direct run
    default: '500'
    type: int
  WINDOW_FUNCTION:
    section: TIME-DEPENDENT SIMULATION
    description: Window used for reverse sweep and direct run. Options (SQUARE, HANN,
      HANN_SQUARE, BUMP) Square is default.
    default: SQUARE
    type: enum
    choices:
    - SQUARE
    - HANN
    - HANN_SQUARE
    - BUMP
  UNST_ADJOINT_ITER:
    section: TIME-DEPENDENT SIMULATION
    description: Starting direct solver iteration for the unsteady adjoint
    default: '0'
    type: int
  HYBRID_RANSLES:
    section: DES Parameters
    description: Specify Hybrid RANS/LES model (SA_DES, SA_DDES, SA_ZDES, SA_EDDES)
    default: SA_DDES
    type: enum
    choices:
    - SA_DES
    - SA_DDES
    - SA_ZDES
    - SA_EDDES
    requires_solver: *id001
  DES_CONST:
    section: DES Parameters
    description: DES Constant (0.65)
    default: '0.65'
    type: float
    requires_solver: *id001
  MACH_NUMBER:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Mach number (non-dimensional, based on the free-stream values)
    default: '0.8'
    type: float
    requires_solver: &id002
    - EULER
    - NAVIER_STOKES
    - RANS
    - FEM_EULER
    - FEM_NAVIER_STOKES
    - FEM_RANS
    - FEM_LES
    - NEMO_EULER
    - NEMO_NAVIER_STOKES
    - DISC_ADJ_EULER
    - DISC_ADJ_NAVIER_STOKES
    - DISC_ADJ_RANS
  AOA:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Angle of attack (degrees, only for compressible flows)
    default: '1.25'
    type: float
    requires_solver: *id002
  SIDESLIP_ANGLE:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Side-slip angle (degrees, only for compressible flows)
    default: '0.0'
    type: float
    requires_solver: *id002
  INIT_OPTION:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Init option to choose between Reynolds (default) or thermodynamics
      quantities for initializing the solution (REYNOLDS, TD_CONDITIONS)
    default: REYNOLDS
    type: enum
    choices:
    - REYNOLDS
    - TD_CONDITIONS
  FREESTREAM_OPTION:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Free-stream option to choose between density and temperature (default)
      for initializing the solution (TEMPERATURE_FS, DENSITY_FS)
    default: TEMPERATURE_FS
    type: enum
    choices:
    - TEMPERATURE_FS
    - DENSITY_FS
  FREESTREAM_PRESSURE:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Free-stream pressure (101325.0 N/m^2, 2116.216 psf by default)
    default: '101325.0'
    type: float
    requires_solver: *id002
  FREESTREAM_TEMPERATURE:
    section: SOLID ZONE HEAT VARIABLES
    description: Solids temperature at freestream conditions
    default: '288.15'
    type: float
    requires_solver: *id002
  FREESTREAM_TEMPERATURE_VE:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Free-stream VIBRATIONAL temperature (288.15 K, 518.67 R by default)
    default: '288.15'
    type: float
    requires_solver: &id004
    - NEMO_EULER
    - NEMO_NAVIER_STOKES
  REYNOLDS_NUMBER:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Reynolds number (non-dimensional, based on the free-stream values)
    default: 6.5E6
    type: float
    requires_solver: *id002
  REYNOLDS_LENGTH:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Reynolds length (1 m, 1 inch by default)
    default: '1.0'
    type: float
    requires_solver: *id002
  FREESTREAM_DENSITY:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Free-stream density (1.2886 Kg/m^3, 0.0025 slug/ft^3 by default)
    default: '1.2886'
    type: float
    requires_solver: *id002
  FREESTREAM_VELOCITY:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Free-stream velocity (1.0 m/s, 1.0 ft/s by default)
    default: ( 1.0, 0.00, 0.00 )
    type: list
  FREESTREAM_VISCOSITY:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Free-stream viscosity (1.853E-5 N s/m^2, 3.87E-7 lbf s/ft^2 by default)
    default: '1.853E-5'
    type: float
    requires_solver: &id005
    - NAVIER_STOKES
    - RANS
    - INC_NAVIER_STOKES
    - INC_RANS
    - FEM_NAVIER_STOKES
    - FEM_RANS
    - FEM_LES
    - NEMO_NAVIER_STOKES
    - DISC_ADJ_NAVIER_STOKES
    - DISC_ADJ_RANS
    - DISC_ADJ_INC_NAVIER_STOKES
    - DISC_ADJ_INC_RANS
  FREESTREAM_TURBULENCEINTENSITY:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Free-stream turbulence intensity
    default: '0.05'
    type: float
    requires_solver: *id001
  FREESTREAM_INTERMITTENCY:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Value for freestream intermittency
    default: '1.0'
    type: float
  TURB_FIXED_VALUES:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Fix turbulence quantities to far-field values inside an upstream
      half-space
    default: 'NO'
    type: bool
  TURB_FIXED_VALUES_DOMAIN:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Shift of the half-space on which fixed values are applied. It consists
      of those coordinates whose dot product with the normalized far-field velocity
      is less than this parameter.
    default: '-1.0'
    type: float
  FREESTREAM_TURB2LAMVISCRATIO:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Free-stream ratio between turbulent and laminar viscosity
    default: '10.0'
    type: float
    requires_solver: *id001
  REF_DIMENSIONALIZATION:
    section: COMPRESSIBLE FREE-STREAM DEFINITION
    description: Compressible flow non-dimensionalization (DIMENSIONAL, FREESTREAM_PRESS_EQ_ONE,
      FREESTREAM_VEL_EQ_MACH, FREESTREAM_VEL_EQ_ONE)
    default: DIMENSIONAL
    type: enum
    choices:
    - DIMENSIONAL
    - FREESTREAM_PRESS_EQ_ONE
    - FREESTREAM_VEL_EQ_MACH
    - FREESTREAM_VEL_EQ_ONE
    - INITIAL_VALUES
    - REFERENCE_VALUES
    requires_solver: *id002
  INC_DENSITY_MODEL:
    section: INCOMPRESSIBLE FLOW CONDITION DEFINITION
    description: Density model within the incompressible flow solver. Options are
      CONSTANT (default), BOUSSINESQ, VARIABLE, or FLAMELET. If VARIABLE, an appropriate
      fluid model must be selected. For FLAMELET, the density is retrieved directly
      from the flamelet manifold.
    default: CONSTANT
    type: enum
    choices:
    - CONSTANT
    - BOUSSINESQ
    - VARIABLE
    - FLAMELET
    requires_solver: &id003
    - INC_EULER
    - INC_NAVIER_STOKES
    - INC_RANS
    - DISC_ADJ_INC_EULER
    - DISC_ADJ_INC_NAVIER_STOKES
    - DISC_ADJ_INC_RANS
  INC_ENERGY_EQUATION:
    section: INCOMPRESSIBLE FLOW CONDITION DEFINITION
    description: Solve the energy equation in the incompressible flow solver
    default: 'NO'
    type: bool
    requires_solver: *id003
  TEMPERATURE_LIMITS:
    section: INCOMPRESSIBLE FLOW CONDITION DEFINITION
    description: Temperature limits for incompressible flows (0.0, 5000.0 K by default).
    default: 0.0, 5000.0
    type: string
  INC_DENSITY_INIT:
    section: INCOMPRESSIBLE FLOW CONDITION DEFINITION
    description: Initial density for incompressible flows (1.2886 kg/m^3 by default
      (air), 998.2 Kg/m^3 (water))
    default: '1.2886'
    type: float
    requires_solver: *id003
  INC_VELOCITY_INIT:
    section: INCOMPRESSIBLE FLOW CONDITION DEFINITION
    description: Initial velocity for incompressible flows (1.0,0,0 m/s by default)
    default: ( 1.0, 0.0, 0.0 )
    type: list
    requires_solver: *id003
  INC_TEMPERATURE_INIT:
    section: INCOMPRESSIBLE FLOW CONDITION DEFINITION
    description: Initial temperature for incompressible flows that include the energy
      equation (288.15 K by default). Value is ignored if INC_ENERGY_EQUATION is false.
    default: '288.15'
    type: float
    requires_solver: *id003
  INC_NONDIM:
    section: INCOMPRESSIBLE FLOW CONDITION DEFINITION
    description: Non-dimensionalization scheme for incompressible flows. Options are
