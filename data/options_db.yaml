    - PASTIX_LU
  LINEAR_SOLVER_INNER:
    section: LINEAR SOLVER DEFINITION
    description: 'Inner solver used for nested preconditioning (BCGSTAB is only possible
      with flexible linear solvers). Options: NONE, BCGSTAB, SMOOTHER Inner BCGSTAB
