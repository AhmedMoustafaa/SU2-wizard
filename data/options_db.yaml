      syntax within the OPT_OBJECTIVE list. ex= Objective * Scale'
    default: DRAG
    type: string
  OPT_CONSTRAINT:
    section: OPTIMAL SHAPE DESIGN DEFINITION
    description: Optimization constraint functions with pushing factors (affects its
      value, not the gradient  in the python scripts), separated by semicolons ex=
