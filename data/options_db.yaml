    section: OPTIMAL SHAPE DESIGN DEFINITION
    description: Factor to reduce the norm of the gradient (affects the objective
      function and gradient in the python scripts) In general, a norm of the gradient
      ~1E-6 is desired.
    default: 1E-6
    type: float
  OPT_RELAX_FACTOR:
    section: OPTIMAL SHAPE DESIGN DEFINITION
    description: Factor to relax or accelerate the optimizer convergence (affects
      the line search in SU2_DEF) In general, surface deformations of 0.01'' or 0.0001m
      are desirable
    default: 1E3
