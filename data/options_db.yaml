  SLOPE_LIMITER_ADJTURB:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Slope limiter (see SLOPE_LIMITER_ADJFLOW)
    default: VENKATAKRISHNAN
    type: enum
    choices:
    - NONE
    - VENKATAKRISHNAN
    - NISHIKAWA_R3
    - NISHIKAWA_R4
    - NISHIKAWA_R5
    - VENKATAKRISHNAN_WANG
    - BARTH_JESPERSEN
    - VAN_ALBADA_EDGE
    - SHARP_EDGES
    - WALL_DISTANCE
  VENKAT_LIMITER_COEFF:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Coefficient for Venkatakrishnan-type limiters (upwind scheme). A
      larger value decreases the extent of limiting, values approaching zero cause
      lower-order approximation to the solution (0.05 by default)
    default: '0.05'
    type: float
