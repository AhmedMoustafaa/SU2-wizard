    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: Remove sharp edges from the sensitivity evaluation (NO, YES)
    default: 'NO'
    type: enum
    choices:
    - 'NO'
    - 'YES'
  SENS_SMOOTHING:
    section: SLOPE LIMITER AND DISSIPATION SENSOR DEFINITION
    description: ''
    default: NONE
    type: string
